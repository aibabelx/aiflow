services:
  aiflow:
    image: aiflow-server:latest
    container_name: aiflow
    ports:
      - "8000:8000"
    environment:
      - AIFLOW_LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
